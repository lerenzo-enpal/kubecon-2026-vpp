name: Deploy to GitHub Pages

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Site + Presentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Install presentation deps
        working-directory: presentation
        run: npm ci

      - name: Build presentation with /kubecon-2026-vpp/slides/ base path
        working-directory: presentation
        run: npm run build -- --base /kubecon-2026-vpp/slides/

      - name: Assemble deploy artifact
        run: |
          mkdir -p _site
          cp -r website/dist/* _site/
          mkdir -p _site/slides
          cp -r presentation/dist/* _site/slides/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
