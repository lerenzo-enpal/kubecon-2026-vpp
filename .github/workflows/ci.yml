name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  website:
    name: Website Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm test

  presentation:
    name: Presentation Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: presentation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: presentation/package-lock.json
      - run: npm ci
      - run: npm run build
