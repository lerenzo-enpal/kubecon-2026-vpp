<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes flash { 0%,100% { opacity: 0.9; } 50% { opacity: 0.4; } }
    @keyframes twinkle1 { 0%,100% { opacity: 0.7; r: 0.8; } 50% { opacity: 0.2; r: 0.4; } }
    @keyframes twinkle2 { 0%,100% { opacity: 0.4; r: 0.6; } 50% { opacity: 0.8; r: 0.9; } }
    @keyframes twinkle3 { 0%,100% { opacity: 0.5; r: 0.5; } 50% { opacity: 0.1; r: 0.3; } }
    @keyframes jolt { 0%,100% { transform: translate(0,0); } 25% { transform: translate(0.5px,-0.3px); } 75% { transform: translate(-0.4px,0.2px); } }
    .bolt { animation: flash 1.8s ease-in-out infinite, jolt 0.15s ease-in-out infinite; transform-origin: 16px 16px; }
    .s1 { animation: twinkle1 2.2s ease-in-out infinite; }
    .s2 { animation: twinkle2 1.7s ease-in-out infinite; }
    .s3 { animation: twinkle3 2.8s ease-in-out infinite; }
  </style>
  <rect width="32" height="32" rx="4" fill="#0a0e17"/>
  <!-- House silhouette -->
  <path d="M16 5 L26 13 L26 27 L6 27 L6 13 Z" fill="#22d3ee12" stroke="#22d3ee" stroke-width="1.2" stroke-linejoin="round" opacity="0.7"/>
  <!-- Door -->
  <rect x="13" y="20" width="6" height="7" rx="1" fill="#22d3ee20" stroke="#22d3ee" stroke-width="0.6" opacity="0.5"/>
  <!-- Lightning bolt -->
  <path class="bolt" d="M19 7 L15 15 L18 15 L14 25 L20 16 L17 16 Z" fill="#22d3ee"/>
  <!-- Sparkle dots -->
  <circle class="s1" cx="9" cy="9" r="0.8" fill="#22d3ee"/>
  <circle class="s2" cx="24" cy="7" r="0.6" fill="#22d3ee"/>
  <circle class="s3" cx="27" cy="12" r="0.5" fill="#22d3ee"/>
</svg>
